# Jenkins reverse proxy — place at /etc/nginx/conf.d/jenkins.conf on the Jenkins host.
# Requires the upgrade-map.conf snippet (see infra/nginx/upgrade-map.conf).
# Run `sudo certbot --nginx -d jenkins.yourdomain.com` to add the TLS (443) block.

upstream jenkins {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name jenkins.yourdomain.com;   # <-- replace with your real domain

    location / {
        proxy_pass         http://jenkins;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Jenkins websockets (inbound agents, live console)
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Upgrade           $http_upgrade;

        proxy_buffering    off;
        proxy_read_timeout 90s;
    }
}
