# Bind Jenkins to localhost so it is only reachable through the nginx reverse proxy.
# Place at /etc/systemd/system/jenkins.service.d/proxy.conf
# then: sudo systemctl daemon-reload && sudo systemctl restart jenkins
# After this, remove the public port-8080 rule from the EC2 security group.
[Service]
Environment="JENKINS_LISTEN_ADDRESS=127.0.0.1"
