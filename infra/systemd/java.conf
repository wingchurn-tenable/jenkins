# Pin Jenkins to Java 21 (required by recent Jenkins releases).
# Place at /etc/systemd/system/jenkins.service.d/java.conf
# then: sudo systemctl daemon-reload && sudo systemctl restart jenkins
# Adjust the path for your distro:
#   Amazon Linux: /usr/lib/jvm/java-21-amazon-corretto.x86_64
#   Ubuntu:       /usr/lib/jvm/java-21-openjdk-amd64
[Service]
Environment="JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto.x86_64"
Environment="PATH=/usr/lib/jvm/java-21-amazon-corretto.x86_64/bin:/usr/bin:/bin"
